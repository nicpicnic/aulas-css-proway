<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>

        * {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }

        .principal {
            background-color: seagreen;
            width: 100%;
            height: 100vh;
            padding: 24px;
            display: flex;
            justify-content: space-evenly;
            align-items: stretch;
        }

        .bloco {
            background-color: tomato;
            width: 100px;
            height: 100px;
            border-radius: 8px;
            text-align: center;
            font-size: 32px;
            padding: 8px;
        }

    </style>
</head>
<body>

    <div class="principal">

        <div class="bloco">A</div>
        <div class="bloco">B</div>
        <div class="bloco">C</div>

    </div>
    
</body>
</html>

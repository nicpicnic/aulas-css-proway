<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        body {
            background-color: rgb(238, 215, 166);
            font-family: 'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif
        }

        .card {
            border: 1px solid darkviolet;
            background-color: rgba(245, 218, 245, 0.5);
            width: 200px;
        }

        img {
            width: 100%;
        }

        h1 {
            color: red;
        }

        h3 {
            text-align: center;
        }

        p {
            text-align: center;
            font-size: 1.2em;
            color: firebrick;
        }

        button {
            display: block;
            margin: 0 auto 20px auto;
            padding: 10px 70px;
            background-color: darkolivegreen;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <h1>Exemplo de Card</h1>

    <div class="card">
        <img src="https://ikesaki.vteximg.com.br/arquivos/ids/269373/Creme-para-Pentear-Beleza-Natural-Tradicional-1000ml-7898236089301.png"
            alt="Creme de cabelo">
        <h3>Creme de cabelo</h3>
        <p>R$19,99</p>
        <button>Comprar</button>
    </div>
</body>

</html>
